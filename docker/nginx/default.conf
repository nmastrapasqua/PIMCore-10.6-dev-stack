upstream php-pimcore {
    server php:9000;
}

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Pimcore head-request
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # Upload max size
    client_max_body_size 100m;

    # Assets statici
    location ~* ^/bundles/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Thumbnails e asset Pimcore
    location ~* .*/(image|video)-thumb__[\d]+__.* {
        try_files /var/tmp/thumbnails$uri /var/tmp/thumbnails$uri/ @php;
    }

    # Asset statici
    location ~* ^(?!/admin)(.+\.(?:css|js|jpe?g|gif|png|svg|ico|woff2?|ttf|eot|webp|avif))$ {
        try_files $uri /index.php$is_args$args;
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    # Tutte le altre richieste vanno a Pimcore
    location / {
        error_page 404 /meta/404;
        try_files $uri /index.php$is_args$args;
    }

    # PHP-FPM
    location ~ \.php$ {
        # Previeni accesso diretto a file PHP
        try_files $uri =404;

        fastcgi_pass php-pimcore;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_intercept_errors on;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Blocca accesso a file nascosti
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
