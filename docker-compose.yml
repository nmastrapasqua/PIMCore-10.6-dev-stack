services:
  # Nginx reverse proxy
  nginx:
    image: nginx:1.24-alpine
    ports:
      - "8480:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app:/var/www/html:cached
    depends_on:
      - php
    networks:
      - pimcore

  # PHP-FPM
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    volumes:
      - ./app:/var/www/html:cached
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PIMCORE_DB_DSN: "mysql://pimcore:pimcore@db:3306/pimcore"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PIMCORE_INSTALL_ADMIN_USERNAME: admin
      PIMCORE_INSTALL_ADMIN_PASSWORD: admin
      PIMCORE_INSTALL_MYSQL_HOST_SOCKET: db
      PIMCORE_INSTALL_MYSQL_PORT: 3306
      PIMCORE_INSTALL_MYSQL_USERNAME: pimcore
      PIMCORE_INSTALL_MYSQL_PASSWORD: pimcore
      PIMCORE_INSTALL_MYSQL_DATABASE: pimcore
    networks:
      - pimcore

  # Pimcore worker per cron job e maintenance
  supervisord:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/supervisord.conf"]
    volumes:
      - ./app:/var/www/html:cached
      - ./docker/supervisord/pimcore.conf:/etc/supervisor/conf.d/pimcore.conf:ro
    depends_on:
      - php
    environment:
      PIMCORE_DB_DSN: "mysql://pimcore:pimcore@db:3306/pimcore"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - pimcore

  # MySQL 8.0
  db:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --lower_case_table_names=1
    ports:
      - "33060:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pimcore
      MYSQL_USER: pimcore
      MYSQL_PASSWORD: pimcore
    volumes:
      - pimcore-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pimcore

  # Redis per cache e sessioni
  redis:
    image: redis:7-alpine
    ports:
      - "63790:6379"
    volumes:
      - pimcore-redis:/data
    networks:
      - pimcore

volumes:
  pimcore-db:
  pimcore-redis:

networks:
  pimcore:
    driver: bridge
